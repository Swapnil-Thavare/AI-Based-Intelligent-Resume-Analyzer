<link rel="stylesheet" href="/static/style.css">

    <div class="top-bar-fixed">

        <!-- DARK MODE -->
        <button onclick="toggleMode()" class="toggle-btn">🌙</button>

        <!-- PROFILE -->
        <div class="profile-box" onclick="toggleProfile()">
            {{ session['user'][0] | upper }}

            <div id="profileDropdown" class="profile-dropdown">
                <p><b>{{ session['user'] }}</b></p>
                <p>{{ session['email'] }}</p>
                <a href="/logout">Logout</a>
            </div>
        </div>

    </div>

<div class="container">
    <h2>Match Score: {{ (score * 10) | round(2) }}%</h2>

    <h3>Suggestions</h3>
    <ul>
        {% for s in suggestions %}
            <li>{{ s }}</li>
        {% endfor %}
    </ul>

    <a href="/dashboard">
        <button>Back to Dashboard</button>
    </a>
</div>

<script>
function toggleMode() {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme", document.body.classList.contains("dark"));
}

window.onload = () => {
    if (localStorage.getItem("theme") === "true") {
        document.body.classList.add("dark");
    }
}

function toggleProfile() {
    document.getElementById("profileDropdown").classList.toggle("show");
}

// click outside to close
window.addEventListener("click", function(e) {
    const dropdown = document.getElementById("profileDropdown");
    const profile = document.querySelector(".profile-box");

    if (!profile.contains(e.target)) {
        dropdown.classList.remove("show");
    }
});
</script>
